databases:
  - name: it-support-queue-db
    databaseName: it_support_queue
    user: it_support_user

services:
  - type: web
    name: it-support-queue
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: it-support-queue-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 2
      - key: PYTHON_VERSION
        value: 3.12.0
